<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05010d"/>
      <stop offset="0.55" stop-color="#140d2a"/>
      <stop offset="1" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF71CE"/>
      <stop offset="0.5" stop-color="#FFFB96"/>
      <stop offset="1" stop-color="#01CDFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="260" fill="#01CDFE" opacity="0.12"/>
  <circle cx="220" cy="560" r="220" fill="#FF71CE" opacity="0.12"/>
  <circle cx="600" cy="80" r="180" fill="#B967FF" opacity="0.1"/>

  <g transform="translate(90,150)" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="18" r="13"/>
    <circle cx="20" cy="86" r="13"/>
    <circle cx="84" cy="40" r="13"/>
    <path d="M20 31v42"/>
    <path d="M84 53c0 28-30 26-50 30"/>
    <path d="M74 28 84 40l-7 14"/>
  </g>

  <text x="210" y="215" font-family="Space Grotesk, sans-serif" font-size="92" font-weight="700" fill="#ffffff">Lore<tspan fill="url(#accent)">GUI</tspan></text>

  <text x="92" y="350" font-family="Inter, sans-serif" font-size="40" font-weight="600" fill="#F5E6CA">A beautiful desktop GUI for Lore.</text>
  <text x="92" y="410" font-family="Inter, sans-serif" font-size="30" fill="#b9a9d6">Epic&#8217;s next-generation version control for code</text>
  <text x="92" y="452" font-family="Inter, sans-serif" font-size="30" fill="#b9a9d6">and huge binary assets &#8212; without the command line.</text>

  <g transform="translate(92,520)">

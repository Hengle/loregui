name: release

# Multi-platform installers published to GitHub Releases:
#   - push to main  → refreshes the rolling `nightly` prerelease (current build)
#   - push of a tag `v*` → a proper versioned release (draft)
# Windows + Linux build on GitHub-hosted runners; macOS builds on GitHub-hosted
# macos-latest (ARM64) — matching StudioBrain's proven setup (SBAI-3263: macOS
# moved OFF the self-hosted runner). Apple certs are imported from GH secrets
# (the same keychain-import flow as the StudioBrain desktop app); if the cert
# secret is absent the build is produced UNSIGNED (never blocks the release).
#
# Auto-update (SBAI-4040): bundle.createUpdaterArtifacts=true makes tauri-action
# produce the per-platform `.sig` update artifacts AND a `latest.json` manifest,
# which it uploads to the same GitHub Release. The app's updater endpoint
# (src-tauri/tauri.conf.json → plugins.updater.endpoints) points at the
# `nightly` tag's latest.json. The artifacts are signed with the updater key in
# the GH secret TAURI_SIGNING_PRIVATE_KEY (+ optional _PASSWORD); the matching
# public key is committed in tauri.conf.json. NOTE: GitHub's `releases/latest`
# redirect skips prereleases, so the endpoint must reference the `nightly` tag
# explicitly until the first stable `v*` release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        # `triple` is the Rust target triple Tauri appends to each `externalBin`
        # entry (SBAI-4069). The staged sidecar MUST be named
        # `src-tauri/binaries/loreserver-<triple>[.exe]` or `tauri build` fails.
        #   x86_64-unknown-linux-gnu  (ubuntu)
        #   x86_64-pc-windows-msvc    (windows, + .exe)
        #   aarch64-apple-darwin      (macos, Apple Silicon)
        include:
          - platform: windows-latest
            triple: x86_64-pc-windows-msvc
            sidecar_ext: ".exe"
          - platform: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            sidecar_ext: ""
          - platform: macos-latest
            triple: aarch64-apple-darwin
            sidecar_ext: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Linux build deps (webkit/gtk/appindicator)
        if: ${{ matrix.platform == 'ubuntu-22.04' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev

      # Match StudioBrain's macOS signing: import the cert into a temp keychain.
      # Missing/empty APPLE_CERTIFICATE ⇒ unsigned build (SIGNING_IDENTITY=-),
      # so a release is never blocked by signing.
      - name: Set up Apple code signing
        if: ${{ matrix.platform == 'macos-latest' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -e
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret — building UNSIGNED."
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASS=$(openssl rand -base64 20)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          if ! security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t agg -f pkcs12 -k "$KEYCHAIN_PATH"; then
            echo "Cert import failed (wrong password?) — building UNSIGNED."
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            exit 0
          fi
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
          # Notarization runs ONLY when creds are present (otherwise signed-but-not-
          # notarized, never a hard failure). Prefer the App Store Connect API key
          # (APPLE_API_KEY + APPLE_API_ISSUER + the .p8); fall back to apple-id.
          if [ -n "${{ secrets.APPLE_API_KEY }}" ] && [ -n "${{ secrets.APPLE_API_ISSUER }}" ]; then
            printf '%s' "$APPLE_API_KEY_P8_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.APPLE_ID }}" ]; then
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          fi

      - name: Install frontend deps
        run: npm --prefix frontend ci || npm --prefix frontend install

      # Extract the top (most-recent) section of CHANGELOG.md to use as the
      # GitHub Release body for tagged builds (replaces the old static "See the
      # changelog." placeholder). Runs once on the Linux runner; the value is
      # platform-independent and each matrix leg re-derives it cheaply.
      - name: Derive release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -e
          if [ -f CHANGELOG.md ]; then
            # Grab everything from the first "## " heading up to (but not
            # including) the next "## " heading — i.e. the latest release block.
            BODY="$(awk '/^## /{c++} c==1{print} c==2{exit}' CHANGELOG.md)"
          else
            BODY="See the changelog."
          fi
          [ -z "$BODY" ] && BODY="See the changelog."
          {
            echo "body<<__LOREGUI_NOTES__"
            echo "$BODY"
            echo "__LOREGUI_NOTES__"
          } >> "$GITHUB_OUTPUT"

      # --- loreserver sidecar (SBAI-4069) ------------------------------------
      # Ship the real upstream `loreserver` as a Tauri `externalBin` so the
      # packaged "Host a server" flow works without a dev checkout. This is the
      # heavy upstream build (~1 GB from the pinned `lore` git checkout), so it
      # ONLY runs on this release matrix — the windows-build PR gate must NOT
      # bundle it. The built binary is cached, keyed on the pinned lore rev +
      # target triple, so it is built once per rev per platform.
      - name: Read pinned lore rev (sidecar cache key)
        id: lorerev
        shell: bash
        run: |
          REV="$(grep -oE 'rev = "[0-9a-f]{40}"' Cargo.toml | head -1 | grep -oE '[0-9a-f]{40}')"
          if [ -z "$REV" ]; then
            echo "FATAL: could not read pinned lore rev from Cargo.toml" >&2
            exit 1
          fi
          echo "rev=$REV" >> "$GITHUB_OUTPUT"
          echo "Pinned lore rev: $REV"

      - name: Cache built loreserver sidecar
        id: sidecar-cache
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/loreserver-${{ matrix.triple }}${{ matrix.sidecar_ext }}
          key: loreserver-${{ matrix.triple }}-${{ steps.lorerev.outputs.rev }}

      # A separate cache for the heavy lore build's target dir, so even a cache
      # miss on the binary (e.g. rev bump) doesn't recompile the whole world.
      - name: Cache lore build (cargo + target)
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: loreserver-build-${{ matrix.triple }}-${{ steps.lorerev.outputs.rev }}
          # The lore checkout lives in the cargo git cache, not the workspace;
          # cache the cargo registry/git + that checkout's own target dir.
          cache-all-crates: true

      - name: Build + stage loreserver sidecar
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -e
          # Populate the cargo git cache with the pinned lore checkout, then
          # build the upstream server binary from it (exactly as the SBAI-4064
          # spike script does).
          cargo fetch
          REV="${{ steps.lorerev.outputs.rev }}"
          SHORT="${REV:0:7}"
          CARGO_HOME_DIR="${CARGO_HOME:-$HOME/.cargo}"
          LORE_CHECKOUT="$(find "$CARGO_HOME_DIR/git/checkouts" -maxdepth 2 -type d -name "$SHORT" 2>/dev/null | head -1)"
          if [ -z "$LORE_CHECKOUT" ]; then
            echo "FATAL: lore checkout for rev $SHORT not found under cargo git cache" >&2
            exit 1
          fi
          echo "lore checkout: $LORE_CHECKOUT"
          ( cd "$LORE_CHECKOUT" && cargo build --release -p lore-server --bin loreserver --target ${{ matrix.triple }} )
          # `--target` puts the binary under target/<triple>/release/.
          BIN="$LORE_CHECKOUT/target/${{ matrix.triple }}/release/loreserver${{ matrix.sidecar_ext }}"
          if [ ! -f "$BIN" ]; then
            echo "FATAL: built loreserver not found at $BIN" >&2
            exit 1
          fi
          mkdir -p src-tauri/binaries
          cp "$BIN" "src-tauri/binaries/loreserver-${{ matrix.triple }}${{ matrix.sidecar_ext }}"

      - name: Verify staged sidecar exists
        shell: bash
        run: |
          STAGED="src-tauri/binaries/loreserver-${{ matrix.triple }}${{ matrix.sidecar_ext }}"
          if [ ! -f "$STAGED" ]; then
            echo "FATAL: sidecar not staged at $STAGED — tauri build would fail" >&2
            exit 1
          fi
          ls -la "$STAGED"

      # Windows Authenticode signing (non-blocking). When the WINDOWS_CERTIFICATE
      # secret (base64-encoded PKCS#12 .pfx) is present we import it into a temp
      # cert store and write a Tauri config override telling the bundler to
      # `signtool sign` every produced .exe / installer with that cert. Absent
      # the secret, NO override is written and the Windows build ships UNSIGNED —
      # exactly like the macOS path, the release is never blocked by signing.
      #
      # To enable: add repo secrets
      #   WINDOWS_CERTIFICATE          base64 of your code-signing .pfx
      #   WINDOWS_CERTIFICATE_PASSWORD the .pfx password
      # An EV/OV cert from a CA (DigiCert, Sectigo, etc.) is required for a clean
      # SmartScreen reputation; a self-signed cert will sign but not be trusted.
      - name: Set up Windows code signing
        id: winsign
        if: ${{ matrix.platform == 'windows-latest' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "No WINDOWS_CERTIFICATE secret - building UNSIGNED."
            "config_arg=" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "loregui-codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pass = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pass
          $thumb = $cert.Thumbprint
          Write-Host "Imported code-signing cert: $thumb"
          # Override only bundle.windows.signCommand so the unsigned default
          # config stays valid when the secret is absent. %1 is the file Tauri
          # asks signtool to sign. /tr enables an RFC3161 timestamp.
          $override = @{
            bundle = @{
              windows = @{
                signCommand = "signtool sign /sha1 $thumb /fd sha256 /tr http://timestamp.digicert.com /td sha256 `"%1`""
              }
            }
          } | ConvertTo-Json -Depth 6
          $path = Join-Path $env:RUNNER_TEMP "winsign.tauri.conf.json"
          Set-Content -Path $path -Value $override -Encoding utf8
          # tauri-action passes `args` after `tauri build`; --config merges this
          # override on top of tauri.conf.json.
          "config_arg=--config $path" >> $env:GITHUB_OUTPUT

      - name: Build + publish (Tauri → installers → GitHub Release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_ID/PASSWORD/TEAM_ID are exported to GITHUB_ENV by the signing
          # step ONLY when a real cert is present (empty values would break the
          # notarize step). Tauri updater signing (SBAI-4040): signs the update
          # artifacts + latest.json with the updater private key. No-op if absent
          # (createUpdaterArtifacts then just produces unsigned artifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          # macOS targets aarch64; Windows appends the optional Authenticode
          # --config override (empty when the WINDOWS_CERTIFICATE secret is unset).
          args: ${{ matrix.platform == 'macos-latest' && '--target aarch64-apple-darwin' || (matrix.platform == 'windows-latest' && steps.winsign.outputs.config_arg || '') }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('LoreGUI {0}', github.ref_name) || 'LoreGUI nightly (main)' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/') && steps.notes.outputs.body || 'Rolling build of the latest `main`. Current Windows / Linux / macOS installers. Pre-alpha — CI refreshes this on each push to main.' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
